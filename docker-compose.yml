version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketing-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticketing_user
      POSTGRES_PASSWORD: ticketing_password
      POSTGRES_DB: ticketing_platform
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
